<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GymTrack</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#3b82f6">



<style>
:root {
  --primary: #6366f1;
  --primary-soft: #e0e7ff;

  --secondary: #10b981;
  --secondary-soft: #d1fae5;

  --accent: #f59e0b;
  --accent-soft: #fef3c7;

  --danger: #ef4444;

  --bg: #f8fafc;
  --card: #ffffff;
  --text: #111827;
  --subtext: #6b7280;
}

/* BASE */
body {
  font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Arial,sans-serif;
  background: var(--bg);
  color: var(--text);
  padding:10px;
  margin:0;
}

/* CARDS */
.card {  
  background: var(--card, #ffffff);
  border-radius: 12px;
  padding: 12px;
  margin-bottom: 12px;
  border: 1px solid #e5e7eb;
  box-shadow: 0 4px 10px rgba(0,0,0,.06);
  transition: 0.2s;
}

.card:hover {
  transform: translateY(-2px);
}

.locked {
  background: var(--secondary-soft);
  border: 1px solid var(--secondary);
  opacity: 0.9;
  filter: saturate(0.9);
}
  
/* LAYOUT */
.row {display:flex;gap:8px;flex-wrap:wrap;}

.week-grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(48px,1fr));
  gap:4px;
  margin-top:8px;
}

/* ===== CARD LAYOUT UPGRADE ===== */

.card {
  position: relative;
  padding-left: 14px; /* space for left colour bar */
}

/* LEFT COLOUR BAR */
.card::before {
  content: "";
  position: absolute;
  left: 0;
  top: 0;
  width: 6px;
  height: 100%;
  border-radius: 12px 0 0 12px;
  background: var(--card-accent, var(--card));
}

/* HEADER */
.card-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}

.card-meta {
  font-size: 0.8rem;
  color: var(--subtext);
}

  .pb-badge {
  font-size: 28px;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  animation: popIn 0.4s ease;
}

@keyframes popIn {
  0% { transform: scale(0.2) rotate(-20deg); opacity: 0; }
  60% { transform: scale(1.2) rotate(10deg); opacity: 1; }
  100% { transform: scale(1); rotate: 0; }
}

/* 🎉 Confetti */
.confetti {
  width: 6px;
  height: 6px;
  position: absolute;
  animation: confetti-fall 0.8s ease-out forwards;
}

@keyframes confetti-fall {
  0% { transform: translateY(0) scale(1); opacity: 1; }
  100% { transform: translateY(40px) scale(0.6); opacity: 0; }
}
  
/* MAIN GRID */
.session-grid {
  display: grid;
  grid-template-columns: 1fr 40px 1fr; /* middle slot for trophy */
  gap: 10px;
  align-items: start;
}

/* SET BLOCKS */
.set-block {
  font-size: 0.85rem;
}

.set-row {
  display: flex;
  gap: 4px;
  margin-bottom: 4px;
}

/* PREVIOUS SIDE */
.prev {
  background: #f1f5f9;
  border: 1px solid #e5e7eb;
  border-left: 3px solid #d1d5db;
  border-radius:8px;
  padding:8px;
  flex:1;
  min-width:90px;
}

/* ISOLATION (NEW STYLE) */
.iso {
  background: transparent;
  padding: 6px 0;
  border-bottom: 1px solid #eee;
}

.iso-name {
  font-weight: 600;
  font-size: 0.85rem;
  margin-bottom: 4px;
}

.iso-row {
  display: flex;
  gap: 4px;
}

/* NOTES */
.notes-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-top: 8px;
}

/* VOLUME */
.volume {
  font-size: 0.8rem;
  color: var(--subtext);
  margin-top: 6px;
}
  
/* WEEK BUTTONS */
.week-btn {
  padding:6px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-size:0.85rem;
}

.week-btn.active {
  background: var(--primary);
  color:#fff;
  font-weight:600;
}

.week-btn.inactive {
  background: var(--primary-soft);
  color: var(--primary);
}

.week-btn.inactive:hover {
  filter: brightness(0.95);
}

/* INPUTS */
select,input,textarea,button {
  padding:6px;
  border-radius:8px;
  font-size:0.85rem;
}

input, textarea, select {
  border:1px solid #e5e7eb;
  background:#fff;
  transition:0.2s;
}

input:focus, textarea:focus, select:focus {
  outline:none;
  border-color: var(--primary);
  box-shadow: 0 0 0 2px var(--primary-soft);
}

input[type=number]{width:70px;}
textarea{resize:none;width:100%;}

/* BUTTONS */
button {
  cursor:pointer;
  background: var(--primary);
  color:#fff;
  border:none;
  font-weight:500;
  transition:0.15s;
}

button:hover {
  filter: brightness(0.95);
}

button:active {
  transform: scale(0.97);
}
.graph-btn-active {
  background: var(--primary);
  color: #fff;
}

.graph-btn-inactive {
  background: var(--primary-soft);
  color: var(--primary);
}
  
/* RESET BUTTON */
button[style*="ef4444"] {
  background: var(--danger);
}

  .danger {
  background: var(--danger);
  color: #fff;
}

/* SESSION */
.session {
  margin-top:12px;
}

.curr {
  flex:1;
  min-width:90px;
}

.prev strong {
  color: var(--subtext);
}

.curr strong {
  color: var(--primary);
}

/* SETS */
.set {
  display:flex;
  gap:4px;
  margin-bottom:4px;
  align-items:center;
  flex-wrap:wrap;
}

/* TEXT */
.small {
  font-size:11px;
  color: var(--subtext);
  margin-top:6px;
}

/* HIDDEN */
.hidden {display:none;}

/* STATS */
.stats-week {
  border-bottom:1px solid #ddd;
  padding:8px 0;
}

.stats-lift {
  margin-left:10px;
}

.actions {
  margin-top: 8px;
  display: flex;
  gap: 6px;
}
  
</style>    
</head>

<body>

<!-- HEADER -->
<div class="card">
  <h2>GymTrack</h2>
<div>
  <strong>Cycle:</strong> <span id="cycleNumber"></span>
</div>
  <div class="row">
    <button onclick="changeWeek(-1)">◀</button>
    <select id="cycleSelect" onchange="switchCycle(this.value)">
  <option value="current">Current Cycle</option>
</select>
    <strong id="weekTitle">Week 1</strong>
    <button onclick="changeWeek(1)">▶</button>

    <button onclick="addSession()">Add Session</button>
    <button onclick="completeCycle()" style="background:#16a34a;color:#fff">
  Complete Cycle
</button>
    
    <button onclick="exportData()">Export</button>
    <button onclick="document.getElementById('importFile').click()">Import</button>
    <input id="importFile" type="file" accept=".json" hidden>

    <button onclick="resetAll()" class="danger">Reset</button>
  </div>

  <div id="weekGrid" class="row" style="margin-top:8px"></div>
</div>

  <div class="row" style="margin-top:8px; align-items:flex-start;">
  <button onclick="setView('main')">Main</button>
  <button onclick="setView('progress')">Progress</button>

  <div id="historyBlock">
    <button onclick="setView('history')" id="historyBtn">History</button>

    <div id="graphControls">
      <button id="weightBtn" onclick="setGraphMode('weight')">Weight</button>
      <button id="volumeBtn" onclick="setGraphMode('volume')">Volume</button>

    </div>
  </div>
</div>

<!-- MAIN -->
<div id="sessions"></div>

<script>
  const APP_VERSION = "3.0.0";

    let viewing = "current"; // or index of history
/* ================= DATA ================= */

const MAX_WEEKS = 12;
let currentWeek = 1;

let currentView = "main";

function setView(view){
  currentView = view;
  render();
}
  
const LIFTS = ["Squat","Bench","Deadlift","Row","Overhead Press","Open"];

let db = JSON.parse(localStorage.getItem('db')) || {
  cycle: 1,
  weeks: {},   
  current:{
    lifts:{Squat:[],Bench:[],Deadlift:[]},
    isolations:{Squat:[],Bench:[],Deadlift:[]},
    pbs:{Squat:0,Bench:0,Deadlift:0}
  },
  history:[]
};

function saveDB(){
  localStorage.setItem("db", JSON.stringify(db));
}
const WEEK_TYPES = ["GVT","Core","Pause","Tempo","Other"];

/* ================= HELPERS ================= */

function getWeek(){
  const weeks = getActiveWeeks();

  if (viewing !== "current") {
    return weeks[currentWeek] || [];
  }

  if(!weeks[currentWeek]) weeks[currentWeek] = [];
  return weeks[currentWeek];
}

  function isReadOnly(){
  return viewing !== "current";
}

function setGraphMode(mode){
  graphMode = mode;
  render();
}

  function switchCycle(val){
  viewing = val === "current" ? "current" : Number(val);
  render();
}

  function getActiveWeeks(){
  if (viewing === "current") {
    return db.weeks;
  }

  const cycle = db.history[viewing];
  return cycle ? cycle.weeks : {};
}

function updateCycleDropdown(){
  const sel = document.getElementById('cycleSelect');
  sel.innerHTML = '<option value="current">Current Cycle</option>';

  db.history.forEach((_, i) => {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = `Cycle ${i+1}`;
    sel.appendChild(opt);
  });
}
  
  function getPreviousSession(currentSession) {
  const currentType = currentSession.type;

  // 1️⃣ Same week, earlier sessions
  const weekSessions = getWeek();
  const index = weekSessions.findIndex(s => s.id === currentSession.id);

  for (let i = index - 1; i >= 0; i--) {
    const s = weekSessions[i];
    if (
      s.completed &&
      s.lift === currentSession.lift &&
      s.type === currentType
    ) {
      return s;
    }
  }

  // 2️⃣ Previous weeks (MATCH TYPE ✅)
  for (let w = currentWeek - 1; w >= 1; w--) {
    const sessions = db.weeks[w];
    if (!sessions) continue;

    for (let i = sessions.length - 1; i >= 0; i--) {
      const s = sessions[i];
      if (
        s.completed &&
        s.lift === currentSession.lift &&
        s.type === currentType
      ) {
        return s;
      }
    }
  }

  return null;
}

function getPB(lift){
  let max = 0;

  // Current cycle
  Object.values(db.weeks).forEach(week => {
    week.forEach(session => {
      if (session.lift === lift && session.completed) {
        session.sets.forEach(set => {
          const w = Number(set.w);
          if (w > max) max = w;
        });
      }
    });
  });

  // ✅ SAFE history check
  if (db.history && Array.isArray(db.history)) {
    db.history.forEach(cycle => {
      Object.values(cycle.weeks).forEach(week => {
        week.forEach(session => {
          if (session.lift === lift && session.completed) {
            session.sets.forEach(set => {
              const w = Number(set.w);
              if (w > max) max = w;
            });
          }
        });
      });
    });
  }

  return max;
}
  function isPB(session){
  if (!session.completed) return false;

  const pb = getPB(session.lift);

  return session.sets.some(set => {
    const w = Number(set.w);
    return w > 0 && w === pb;
  });
}

  function getPBDates(lift){
  let pbs = [];
  let max = 0;

  Object.values(db.weeks).forEach((week, wi) => {
    week.forEach(session => {
      if (session.lift !== lift || !session.completed) return;

      session.sets.forEach(set => {
        const w = Number(set.w);
        if (w > max){
          max = w;
          pbs.push({week: wi+1, weight: w});
        }
      });
    });
  });

  return pbs;
}

  function calculateSessionVolume(session){
  let total = 0;

  session.sets.forEach(set => {
    const w = Number(set.w);
    const r = Number(set.r);

    if (w && r) {
      total += w * r;
    }
  });

  return total;
}
  
function hydrateSessionFromHistory(session) {

  delete session._prevMain;
  delete session._prevIso;

  // ✅ ALWAYS calculate previous data (even if completed)
  const prevMain = getPreviousSession(session);
  const prevIso = getPreviousIsolationSession(session);

  session._prevMain = prevMain || null;
  session._prevIso = prevIso || null;

  // ❌ Only stop auto-populating inputs if completed
  if (session.completed) return;

  /* ================= ISOLATIONS ================= */

  // If lift changed, isolation data is invalid
  if (session.isolationLift && session.isolationLift !== session.lift) {
    session.isolations = [{},{},{}];
    delete session.isolationLift;
  }

  const hasIsolationData = session.isolations && session.isolations.length > 0;

  if (!hasIsolationData) {
    const prevIso = getPreviousIsolationSession(session);

    if (
      prevIso &&
      prevIso.lift === session.lift &&
      prevIso.isolations?.some(i => i.name)
    ) {
      session.isolations = prevIso.isolations.map(i => ({ ...i }));
      session.isolationLift = session.lift;
    }
  }
}
  
  function getPreviousIsolationSession(currentSession) {

  // 1️⃣ Same week, earlier sessions (ignore week type)
  const weekSessions = getWeek();
  const index = weekSessions.findIndex(s => s.id === currentSession.id);

  for (let i = index - 1; i >= 0; i--) {
    const s = weekSessions[i];
    if (
      s.completed &&
      s.lift === currentSession.lift &&
      s.isolations?.some(i => i.name)
    ) {
      return s;
    }
  }

  // 2️⃣ Previous weeks (IGNORE week type)
  for (let w = currentWeek - 1; w >= 1; w--) {
    const sessions = db.weeks[w];
    if (!sessions) continue;

    for (let i = sessions.length - 1; i >= 0; i--) {
      const s = sessions[i];
      if (
        s.completed &&
        s.lift === currentSession.lift &&
        s.isolations?.some(i => i.name)
      ) {
        return s;
      }
    }
  }

  return null;
}

/* ================= SESSION OPS ================= */

function addSession(){
  if (viewing !== "current") return;
  getWeek().unshift({
    id: crypto.randomUUID(),
    lift: "Squat",
    type: "Core", // ✅ NEW
    mainSets: "",
    sets: Array.from({length:5},()=>({w:"",r:""})),
    isolations: [],
    isolationLift: null,
    notes: "",
    completed: false,
    timer: 0,
    timerRunning: false,
    gvtCount: 0,
    date: new Date().toISOString().split("T")[0]
  });
  saveDB();
  render();
}

  function normaliseSession(s){
  s.sets = s.sets || [];
  s.isolations = s.isolations || [];
  s.notes = s.notes || "";

  if (!s.date) {
    s.date = new Date().toISOString().split("T")[0];
  }
if (!s.type) {
  s.type = "Core";
}
  return s;
}

  function updateType(id, value){
  const s = getWeek().find(x => x.id === id);
  if (!s) return;

  if (s.completed) return; // 🔒 lock if done

  s.type = value;
  saveDB();
  render();
}
  
function deleteSession(id){
  db.weeks[currentWeek] = getWeek().filter(s=>s.id!==id);
  saveDB();
  render();
}

function completeSession(id){
  const s = getWeek().find(x=>x.id===id);
  s.completed = true;

  if (!s.date) {
    s.date = new Date().toISOString();
  }

  // 🎉 mark for one-time animation
  if (isPB(s)) {
    s.pbHit = true;
  }

  saveDB();
  render();
}

function editSession(id){
  const s = getWeek().find(x=>x.id===id);
  s.completed = false;
  saveDB();
  render();
}

   // ---- RENDER ----

let graphMode = "weight"; // or "volume"
  
function renderMain(c){
  getWeek().forEach(session => {
    hydrateSessionFromHistory(session);

    const liftColors = {
  Squat: 'var(--primary)',
  Bench: 'var(--secondary)',
  Deadlift: 'var(--accent)',
  Row: '#06b6d4',
  "Overhead Press": '#8b5cf6',
  Open: '#9ca3af'
};

const card = document.createElement("div");
card.className = "card";
    if (isPB(session)) {
  const pb = document.createElement("div");
  pb.className = "pb-badge";
  pb.textContent = "🏆";
  card.append(pb);

  // 🎉 Confetti burst
  for (let i = 0; i < 12; i++) {
    const conf = document.createElement("div");
    conf.className = "confetti";
    conf.style.background = ["#f59e0b","#10b981","#6366f1","#ef4444"][i % 4];
    conf.style.left = (80 + Math.random() * 40) + "%";
    conf.style.animationDelay = (Math.random() * 0.3) + "s";
    card.append(conf);
  }
}
// Apply colour bar
card.style.setProperty('--card-accent', liftColors[session.lift] || '#6366f1');

    
    const wrapper = document.createElement("div");
wrapper.className = "session-grid";

/* LEFT = CURRENT */
const left = document.createElement("div");

/* RIGHT = PREVIOUS */
const right = document.createElement("div");
right.className = "prev";

/* ---------- BUILD LEFT (CURRENT) ---------- */

// Date + Lift + Type
left.innerHTML += `
  <div class="top-row">
    <input type="date"
      value="${session.date || ""}"
      ${session.completed || isReadOnly() ? "disabled" : ""}
      onchange="updateDate('${session.id}', this.value)">

    <select ${session.completed || isReadOnly() ? "disabled" : ""}
      onchange="updateLift('${session.id}',this.value)">
      ${LIFTS.map(l => `<option ${l===session.lift?"selected":""}>${l}</option>`).join("")}
    </select>

    <select
      ${session.completed || isReadOnly() ? "disabled" : ""}
      onchange="updateType('${session.id}', this.value)">
      ${WEEK_TYPES.map(t => `
        <option value="${t}" ${t === session.type ? "selected" : ""}>${t}</option>
      `).join("")}
    </select>
  </div>
`;

// Sets
session.sets.forEach((set,i) => {
  left.innerHTML += `
    <div class="set-row">
      <span>${i+1}</span>
      <input type="number" placeholder="kg" value="${set.w || ""}"
        ${session.completed || isReadOnly() ? "disabled" : ""}
        onblur="updateSet('${session.id}',${i},'w',this.value)">
      <input type="number" placeholder="reps" value="${set.r || ""}"
        ${session.completed || isReadOnly() ? "disabled" : ""}
        onblur="updateSet('${session.id}',${i},'r',this.value)">
    </div>
  `;
});

    // Isolation exercises
session.isolations.forEach((iso,i) => {
  left.innerHTML += `
    <div class="iso">
      <input class="iso-name"
  placeholder="Exercise"
  value="${iso.name || ""}"
  ${session.completed || isReadOnly() ? "disabled" : ""}
  onblur="updateIso('${session.id}',${i},'name',this.value)">
      <div class="iso-row">
        <input placeholder="Sets" value="${iso.sets||""}"
          ${session.completed || isReadOnly() ? "disabled" : ""}
          onblur="updateIso('${session.id}',${i},'sets',this.value)">
        <input placeholder="Reps" value="${iso.reps||""}"
          ${session.completed || isReadOnly() ? "disabled" : ""}
          onblur="updateIso('${session.id}',${i},'reps',this.value)">
        <input placeholder="Weight" value="${iso.weight||""}"
          ${session.completed || isReadOnly() ? "disabled" : ""}
          onblur="updateIso('${session.id}',${i},'weight',this.value)">
      </div>
    </div>
  `;
});

left.innerHTML += `
  <button 
    ${!session.completed && !isReadOnly() ? `
  <button onclick="addIsolation('${session.id}')">+ Add Exercise</button>
` : ""}
  </button>
`;
    
// Volume (AFTER sets)
const volume = calculateSessionVolume(session);
left.innerHTML += `
  <div class="volume">
    Volume: <strong>${volume} kg</strong>
  </div>
`;

/* ---------- BUILD RIGHT (PREVIOUS) ---------- */

right.innerHTML = `
  <strong>Previous equivalent session data</strong>
  <table style="width:100%; font-size:0.8rem; margin-top:6px;">
    <thead>
      <tr style="text-align:left; color:#6b7280;">
        <th>Set</th>
        <th>Weight</th>
        <th>Reps</th>
      </tr>
    </thead>
    <tbody id="prev-${session.id}"></tbody>
  </table>
`;

// Main previous (mirrors sets layout)
  if (session._prevMain) {
  const tbody = right.querySelector(`#prev-${session.id}`);

  session._prevMain.sets.forEach((set, i) => {
    if (set.w || set.r) {
      const row = document.createElement("tr");
      row.innerHTML = `
        <td>${i+1}</td>
        <td>${set.w || ""}</td>
        <td>${set.r || ""}</td>
      `;
      tbody.appendChild(row);
    }
  });
}

// Isolation previous
if (session._prevIso) {
  right.innerHTML += `<div class="iso-title">Isolation</div>`;
  session._prevIso.isolations.forEach(i => {
    if (i.name) {
      right.innerHTML += `
        <div class="iso-block">
          <div class="iso-name">${i.name}</div>
          <div class="iso-sets">${i.sets} × ${i.reps} @ ${i.weight}</div>
        </div>
      `;
    }
  });
}

/* ---------- APPEND ---------- */

let pbSlot = document.createElement("div");

if (session.pbHit) {
  for (let i = 0; i < 12; i++) {
    const conf = document.createElement("div");
    conf.className = "confetti";
    conf.style.background = ["#f59e0b","#10b981","#6366f1","#ef4444"][i % 4];
    conf.style.animationDelay = (Math.random() * 0.3) + "s";
    pbSlot.appendChild(conf);
  }

  // remove flag so it doesn't replay
  delete session.pbHit;
  saveDB();
}
    
if (isPB(session)) {
  pbSlot.className = "pb-badge";
  pbSlot.textContent = "🏆";
}

wrapper.append(left, pbSlot, right);
card.append(wrapper);
c.append(card);

const notesRow = document.createElement("div");
notesRow.className = "notes-row";

notesRow.innerHTML = `
  <textarea
    ${session.completed || isReadOnly() ? "disabled" : ""}
    onblur="updateNotes('${session.id}',this.value)"
    placeholder="Notes">${session.notes || ""}</textarea>

  <div class="prev">
    <strong>Previous Notes</strong><br>
    ${session._prevMain?.notes || ""}
  </div>
`;
const actions = document.createElement("div");
actions.className = "actions";

actions.innerHTML = `
  ${!session.completed && !isReadOnly() ? `
    <button onclick="completeSession('${session.id}')">Complete</button>
  ` : ""}

  ${session.completed && !isReadOnly() ? `
    <button onclick="editSession('${session.id}')">Edit</button>
  ` : ""}

  ${!isReadOnly() ? `
    <button class="danger" onclick="deleteSession('${session.id}')">Delete</button>
  ` : ""}
`;

card.append(actions);
card.append(notesRow);
  });
  }
                    
    function estimate1RM(weight, reps){
    weight = Number(weight);
    reps = Number(reps);
    if (!weight || !reps) return 0;
    return Math.round(weight * (1 + reps / 30));
  }

function formatDate(ts){
  if (!ts) return "";
  const d = new Date(ts);
  return `${d.getDate()}/${d.getMonth()+1}`;
}

let bestWeightWeek = null;

  function getLiftHistory(lift) {
  let entries = [];

// Helper to extract max + date from a week
function processWeek(week) {
  let max = 0;
  let bestSession = null;

  week.forEach(session => {
    if (session.lift !== lift || !session.completed) return;

    session.sets.forEach(set => {
      const w = Number(set.w);
      if (w > max) {
        max = w;
        bestSession = session;
      }
    });
  });

  if (max > 0 && bestSession) {
    entries.push({
      weight: max,
      volume: calculateSessionVolume(bestSession),
      date: bestSession.date || new Date().toISOString()
    });
  }
}

  // 1️⃣ Past cycles
  if (db.history && Array.isArray(db.history)) {
    db.history.forEach(cycle => {
      Object.values(cycle.weeks || {}).forEach(week => {
        processWeek(week);
      });
    });
  }

  // 2️⃣ Current cycle
  Object.values(db.weeks || {}).forEach(week => {
    processWeek(week);
  });

  // 3️⃣ Sort by date (important for graph order)
  entries.sort((a, b) => {
    if (!a.date && !b.date) return 0;
    if (!a.date) return -1;
    if (!b.date) return 1;
    return new Date(a.date) - new Date(b.date);
  });

  // 4️⃣ Keep last ~24 entries (~6 months)
  return entries.slice(-24);
}

  
function renderHistory(container){
  const lifts = ["Squat","Bench","Deadlift","Row","Overhead Press"];
  
  lifts.forEach(lift => {

    const data = getLiftHistory(lift);
    if (data.length === 0) return;

    const canvas = document.createElement("canvas");
    canvas.width = 320;
    canvas.height = 200;

    const ctx = canvas.getContext("2d");

    const padding = 30;
    const graphHeight = canvas.height - padding * 2;
    const graphWidth = canvas.width - padding * 2;

    const values = data.map(d => graphMode === "volume" ? d.volume : d.weight);
const maxW = Math.max(...values);
const minW = Math.min(...values);
    const range = maxW - minW || 1;

    let progress = 0;

    function draw(){
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      // ---- Axes ----
      ctx.strokeStyle = "#ddd";
      ctx.beginPath();
      ctx.moveTo(padding, padding);
      ctx.lineTo(padding, canvas.height - padding);
      ctx.lineTo(canvas.width - padding, canvas.height - padding);
      ctx.stroke();

      // ---- Y Axis Labels ----
ctx.fillStyle = "#666";
ctx.font = "10px Arial";
ctx.textAlign = "right";

const steps = 4; // number of horizontal lines

for (let i = 0; i <= steps; i++) {
  const value = minW + (range * i / steps);
  const y = canvas.height - padding - (i / steps) * graphHeight;

  // Label
  ctx.fillText(Math.round(value), padding - 5, y + 3);

  // Grid line
  ctx.strokeStyle = "#eee";
  ctx.beginPath();
  ctx.moveTo(padding, y);
  ctx.lineTo(canvas.width - padding, y);
  ctx.stroke();
}

      // ---- Smooth Main Line ----
      const liftColors = {
  Squat: '#6366f1',
  Bench: '#10b981',
  Deadlift: '#f59e0b',
  Row: '#06b6d4',
  "Overhead Press": '#8b5cf6',
  Open: '#9ca3af'
};

ctx.strokeStyle = liftColors[lift] || '#6366f1';
      ctx.lineWidth = 2;
      ctx.beginPath();

      const visiblePoints = Math.floor(data.length * progress);

      for (let i = 0; i < visiblePoints; i++) {
        const x = padding + (data.length === 1 ? 0.5 : i / (data.length - 1)) * graphWidth;
        const y = canvas.height - padding - ((data[i][graphMode] - minW) / range) * graphHeight;

        if (i === 0) {
          ctx.moveTo(x, y);
        } else {
          const prevX = padding + ((i - 1) / (data.length - 1)) * graphWidth;
          const prevY = canvas.height - padding - ((data[i - 1][graphMode] - minW) / range) * graphHeight;

          const midX = (prevX + x) / 2;
          const midY = (prevY + y) / 2;

          ctx.quadraticCurveTo(prevX, prevY, midX, midY);
        }
      }

      ctx.stroke();

      // ---- Points ----
      const overallMax = Math.max(...values);
      const lastIndex = data.length - 1;

      for (let i = 0; i < visiblePoints; i++) {
        const point = data[i];

        const x = padding + (data.length === 1 ? 0.5 : i / (data.length - 1)) * graphWidth;
        const y = canvas.height - padding - ((point[graphMode] - minW) / range) * graphHeight;

        const isPB = point[graphMode] === overallMax;
        const isLatest = i === lastIndex;

        if (isPB) ctx.fillStyle = "gold";
        else if (isLatest) ctx.fillStyle = "#1e40af";
        else ctx.fillStyle = "#3b82f6";

        ctx.beginPath();
        ctx.arc(x, y, isLatest ? 5 : 3, 0, Math.PI * 2);
        ctx.fill();
      }

      // ---- Dates (x-axis) ----
      ctx.fillStyle = "#666";
      ctx.font = "10px Arial";

      data.forEach((point, i) => {
        if (i % 2 !== 0) return;

        const x = padding + (data.length === 1 ? 0.5 : i / (data.length - 1)) * graphWidth;
        const d = new Date(point.date);
        const label = `${d.getDate()}/${d.getMonth()+1}`;

        ctx.fillText(label, x - 12, canvas.height - 5);
      });
    }

    // ---- Animate ----
    function animate(){
      progress += 0.05;
      if (progress > 1) progress = 1;

      draw();

      if (progress < 1) {
        requestAnimationFrame(animate);
      }
    }

    animate();

    // ---- Tap interaction ----
    canvas.addEventListener("click", (e) => {
      const rect = canvas.getBoundingClientRect();
      const clickX = e.clientX - rect.left;

      let closestIndex = 0;
      let closestDist = Infinity;

      data.forEach((_, i) => {
        const x = padding + (data.length === 1 ? 0.5 : i / (data.length - 1)) * graphWidth;
        const dist = Math.abs(clickX - x);

        if (dist < closestDist) {
          closestDist = dist;
          closestIndex = i;
        }
      });

      const point = data[closestIndex];
      const d = new Date(point.date);

      alert(`${lift}\n${point[graphMode]} kg\n${d.toDateString()}`);
    });

    // ---- Card ----
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `<strong>${lift} Progress (6 months)</strong>`;
    card.append(canvas);

    container.append(card);
  });
}

  let audioCtx = null;

function initAudio(){
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }

  if (audioCtx.state === "suspended") {
    audioCtx.resume();
  }
}
  function beep(freq = 800, duration = 150){
  if (!audioCtx) return;

  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.type = "sine";
  osc.frequency.value = freq;

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.start();

  gain.gain.setValueAtTime(1, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration/1000);

  osc.stop(audioCtx.currentTime + duration/1000);
}
  let interval = null;

function updateDate(id, value){
  const s = getWeek().find(x => x.id === id);
  if (!s) return;

  s.date = value;
  saveDB();
}
  
function startTimer(id){
  initAudio();
  const s = getWeek().find(x => x.id === id);
  if (!s || s.timerRunning) return;

  s.timerRunning = true;
  s.timer = 90;

  interval = setInterval(() => {
  s.timer--;

  /* 🔔 10 second cue */
  if (s.timer === 10) {
    beep(600, 100);
    setTimeout(() => beep(600, 100), 150);
  }

  /* 🔊 Countdown 3,2,1 */
  if (s.timer === 3) beep(900, 120);
  if (s.timer === 2) beep(900, 120);
  if (s.timer === 1) beep(1400, 250);

  if (s.timer <= 0) {
    s.gvtCount = (s.gvtCount || 0) + 1;

    if (s.gvtCount >= 10) {
      clearInterval(interval);
      s.timerRunning = false;
      s.timer = 0;
      saveDB();
      render();
      return;
    }

    s.timer = 90;
  }

  saveDB();

  if (s.timer % 2 === 0) {
    render();
  }

}, 1000);
}

function resetTimer(id){
  const s = getWeek().find(x => x.id === id);
  if (!s) return;

  clearInterval(interval);
  s.timerRunning = false;
  s.timer = 0;
  s.gvtCount = 0;

  saveDB();
  render();
}

  function downloadBackup(data){
  const blob = new Blob([JSON.stringify(data, null, 2)], {
    type: 'application/json'
  });

  const date = new Date().toISOString().split('T')[0];
  const filename = `gymtrack_cycle_${date}.json`;

  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();

  URL.revokeObjectURL(a.href);
}

  localStorage.clear();
