<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GymTrack</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#3b82f6">



<style>
:root {
  --primary: #6366f1;
  --primary-soft: #e0e7ff;

  --secondary: #10b981;
  --secondary-soft: #d1fae5;

  --accent: #f59e0b;
  --accent-soft: #fef3c7;

  --danger: #ef4444;

  --bg: #f8fafc;
  --card: #ffffff;
  --text: #111827;
  --subtext: #6b7280;
}

/* BASE */
body {
  font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Arial,sans-serif;
  background: var(--bg);
  color: var(--text);
  padding:10px;
  margin:0;
  overflow-x: hidden;
}

  * {
  box-sizing: border-box;
}

/* CARDS */
.card {  
  background: var(--card, #ffffff);
  border-radius: 12px;
  padding: 12px;
  margin-bottom: 12px;
  border: 1px solid #e5e7eb;
  box-shadow: 0 4px 10px rgba(0,0,0,.06);
  transition: 0.2s;
  max-width: 100%;
  overflow-x: hidden;
}

.card:hover {
  transform: translateY(-2px);
}

.locked {
  background: var(--secondary-soft);
  border: 1px solid var(--secondary);
  opacity: 0.9;
  filter: saturate(0.9);
}
  
/* LAYOUT */
.row {display:flex;gap:8px;flex-wrap:wrap;}

.week-grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(48px,1fr));
  gap:4px;
  margin-top:8px;
}

  .app-header h2 {
  margin: 0;
  font-size: 1.05rem;
}

.header-top {
  display: grid;
  grid-template-columns: 72px 72px;
  justify-content: space-between;
  align-items: stretch;
  gap: 10px;
  margin-bottom: 10px;
}

.logo-tile {
  min-height: 72px;
  border-radius: 14px;
  background: var(--primary-soft);
  color: var(--primary);
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 8px;
  font-weight: 700;
}

.add-session-btn {
  min-height: 72px;
  border-radius: 14px;
  font-weight: 700;
  line-height: 1.1;
}

.header-week-row {
  display: grid;
  grid-template-columns: 44px 1fr 44px;
  gap: 8px;
  align-items: center;
  margin-bottom: 10px;
}

.week-display {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 44px;
  border-radius: 10px;
  background: #f8fafc;
  border: 1px solid #e5e7eb;
}

.nav-btn {
  min-height: 44px;
  font-size: 1rem;
}

.header-cycle-row {
  display: grid;
  grid-template-columns: 1fr 1.3fr 1fr;
  gap: 8px;
  align-items: stretch;
  margin-bottom: 10px;
}

.cycle-pill {
  min-height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 10px;
  background: #f8fafc;
  border: 1px solid #e5e7eb;
  text-align: center;
  padding: 6px 8px;
}

.cycle-select,
.complete-cycle-btn {
  min-height: 44px;
}

.complete-cycle-btn {
  background: #16a34a;
  color: #fff;
}

.header-utility-row {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 10px;
}

.header-view-row {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  align-items: flex-start;
  margin-top: 10px;
}

.history-controls {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  align-items: flex-start;
}

#graphControls {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

@media (max-width: 700px) {
  .header-cycle-row {
    grid-template-columns: 1fr;
  }

  .header-utility-row,
  .header-view-row,
  .history-controls,
  #graphControls {
    width: 100%;
  }

  .header-utility-row button,
  .header-view-row > button,
  .history-controls > button,
  #graphControls button {
    flex: 1 1 auto;
  }
}

/* ===== CARD LAYOUT UPGRADE ===== */

.card {
  position: relative;
  padding-left: 14px; /* space for left colour bar */
}

/* LEFT COLOUR BAR */
.card::before {
  content: "";
  position: absolute;
  left: 0;
  top: 0;
  width: 6px;
  height: 100%;
  border-radius: 12px 0 0 12px;
  background: var(--card-accent, var(--card));
}

/* HEADER */

  .pb-badge {
  font-size: 28px;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  animation: popIn 0.4s ease;
  position: relative;
  min-width: 40px;
  min-height: 40px;
}

  .pb-badge-slot {
  min-width: 40px;
  min-height: 40px;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  position: relative;
}

@keyframes popIn {
  0% { transform: scale(0.2) rotate(-20deg); opacity: 0; }
  60% { transform: scale(1.2) rotate(10deg); opacity: 1; }
  100% { transform: scale(1); rotate: 0; }
}

/* 🎉 Confetti */
.confetti {
  width: 6px;
  height: 6px;
  position: absolute;
  animation: confetti-fall 0.8s ease-out forwards;
}

@keyframes confetti-fall {
  0% { transform: translateY(0) scale(1); opacity: 1; }
  100% { transform: translateY(40px) scale(0.6); opacity: 0; }
}
  
/* MAIN GRID */
.session-grid {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 40px minmax(0, 1fr);
  gap: 10px;
  align-items: start;
  width: 100%;
}

  .session-grid > div {
  min-width: 0;
}

.top-row,
.set-row,
.iso-row,
.notes-row {
  min-width: 0;
}

  
/* SET BLOCKS */

.set-row {
  display: flex;
  gap: 4px;
  margin-bottom: 4px;
}

/* PREVIOUS SIDE */
.prev {
  background: #f1f5f9;
  border: 1px solid #e5e7eb;
  border-left: 3px solid #d1d5db;
  border-radius: 8px;
  padding: 8px;
  flex: 1;
  min-width: 0;
  overflow-x: hidden;
  font-size: 0.85rem;
}

  .prev table {
  width: 100%;
  table-layout: fixed;
  border-collapse: collapse;
}

.prev th,
.prev td {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  padding: 2px 0;
  font-size: 0.8rem;
}

.prev th {
  font-weight: 600;
  color: var(--subtext);
}

.prev td:first-child,
.prev th:first-child {
  width: 28px;
}

  .prev-section-title {
  margin-top: 10px;
  margin-bottom: 4px;
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--subtext);
}

.prev-iso-block {
  padding: 4px 0;
  border-top: 1px solid #e5e7eb;
}

.prev-iso-name {
  font-size: 0.82rem;
  font-weight: 600;
}

.prev-iso-sets {
  font-size: 0.8rem;
  color: var(--subtext);
}

  .prev-notes {
  font-size: 0.85rem;
  color: var(--text);
  line-height: 1.35;
  white-space: pre-wrap;
}
  
/* ISOLATION (NEW STYLE) */
.iso {
  background: transparent;
  padding: 6px 0;
  border-bottom: 1px solid #eee;
}

.iso-name {
  font-weight: 600;
  font-size: 0.85rem;
  margin-bottom: 4px;
}

.iso-row {
  display: flex;
  gap: 4px;
}

/* NOTES */
.notes-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-top: 8px;
}

/* VOLUME */
.volume {
  font-size: 0.8rem;
  color: var(--subtext);
  margin-top: 6px;
}
  
/* WEEK BUTTONS */
.week-btn {
  padding:6px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-size:0.85rem;
}

.week-btn.active {
  background: var(--primary);
  color:#fff;
  font-weight:600;
}

.week-btn.inactive {
  background: var(--primary-soft);
  color: var(--primary);
}

.week-btn.inactive:hover {
  filter: brightness(0.95);
}

  .week-btn.completed {
  background: #16a34a;
  color: #fff;
  font-weight: 600;
}
  
/* INPUTS */
select,input,textarea,button {
  padding:6px;
  border-radius:8px;
  font-size:0.85rem;
}

input:focus, textarea:focus, select:focus {
  outline:none;
  border-color: var(--primary);
  box-shadow: 0 0 0 2px var(--primary-soft);
}

input, textarea, select {
  border:1px solid #e5e7eb;
  background:#fff;
  transition:0.2s;
  max-width: 100%;
  min-width: 0;
}

input[type=number] {
  width: 100%;
  max-width: 70px;
  min-width: 0;
}
  
textarea{resize:none;width:100%;}

  @media (max-width: 700px) and (orientation: portrait) {
  .notes-row {
    grid-template-columns: 1fr;
  }

  .session-grid {
    grid-template-columns: minmax(0, 1fr) 32px minmax(0, 1fr);
    gap: 8px;
  }

  .card {
    padding: 10px;
    padding-left: 12px;
  }
}

/* BUTTONS */

  .top-row {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 8px;
  align-items: center;
}
  
button {
  cursor:pointer;
  background: var(--primary);
  color:#fff;
  border:none;
  font-weight:500;
  transition:0.15s;
}

button:hover {
  filter: brightness(0.95);
}

button:active {
  transform: scale(0.97);
}
.graph-btn-active {
  background: var(--primary);
  color: #fff;
}

.graph-btn-inactive {
  background: var(--primary-soft);
  color: var(--primary);
}
  
/* RESET BUTTON */
button[style*="ef4444"] {
  background: var(--danger);
}

  .danger {
  background: var(--danger);
  color: #fff;
}

/* SESSION */

.prev strong {
  color: var(--subtext);
}
  

/* HIDDEN */
.hidden {display:none;}

/* STATS */
.stats-week {
  border-bottom:1px solid #ddd;
  padding:8px 0;
}

.stats-lift {
  margin-left:10px;
}

.actions {
  margin-top: 8px;
  display: flex;
  gap: 6px;
}
  
</style>    
</head>

<body>

<!-- HEADER -->
<div class="card app-header">
  <div class="header-top">
    <div class="logo-tile">
      <h2>GymTrack</h2>
    </div>

    <button class="add-session-btn" onclick="addSession()">Add<br>Session</button>
  </div>

  <div class="header-week-row">
    <button class="nav-btn" onclick="changeWeek(-1)">◀</button>
    <strong id="weekTitle" class="week-display">Week 1</strong>
    <button class="nav-btn" onclick="changeWeek(1)">▶</button>
  </div>

  <div class="header-cycle-row">
    <div class="cycle-pill">
      <strong>Cycle:</strong> <span id="cycleNumber"></span>
    </div>

    <select id="cycleSelect" class="cycle-select" onchange="switchCycle(this.value)">
      <option value="current">Current Cycle</option>
    </select>

    <button class="complete-cycle-btn" onclick="completeCycle()">Complete Cycle</button>
  </div>

  <div class="header-utility-row">
    <button onclick="exportData()">Export</button>
    <button onclick="document.getElementById('importFile').click()">Import</button>
    <input id="importFile" type="file" accept=".json" hidden>
    <button onclick="resetAll()" class="danger">Reset</button>
  </div>

  <div id="weekGrid" class="week-grid" style="margin-top:8px"></div>

  <div class="header-view-row">
    <button onclick="setView('main')">Main</button>
    <button onclick="setView('progress')">Progress</button>

    <div id="historyBlock" class="history-controls">
      <button onclick="setView('history')" id="historyBtn">History</button>

      <div id="graphControls">
        <button id="weightBtn" onclick="setGraphMode('weight')">Weight</button>
        <button id="volumeBtn" onclick="setGraphMode('volume')">Volume</button>
      </div>
    </div>
  </div>
</div>

<!-- MAIN -->
<div id="sessions"></div>

<script>
  const APP_VERSION = "3.0.0";

    let viewing = "current"; // or index of history
/* ================= DATA ================= */

const MAX_WEEKS = 12;
let currentWeek = 1;

let currentView = "main";

function setView(view){
  currentView = view;
  render();
}
  
const LIFTS = ["Squat","Bench","Deadlift","Row","Overhead Press","Open"];

let db = JSON.parse(localStorage.getItem('db')) || {
  cycle: 1,
  weeks: {},   
  current:{
    lifts:{Squat:[],Bench:[],Deadlift:[]},
    isolations:{Squat:[],Bench:[],Deadlift:[]},
    pbs:{Squat:0,Bench:0,Deadlift:0}
  },
  history:[]
};

function saveDB(){
  localStorage.setItem("db", JSON.stringify(db));
}
const WEEK_TYPES = ["GVT","Core","Pause","Tempo","Other"];

/* ================= HELPERS ================= */

function getWeek(){
  const weeks = getActiveWeeks();

  if (viewing !== "current") {
    return weeks[currentWeek] || [];
  }

  if(!weeks[currentWeek]) weeks[currentWeek] = [];
  return weeks[currentWeek];
}

function isWeekComplete(weekNum){
  const weeks = getActiveWeeks();

  for (let w = weekNum + 1; w <= MAX_WEEKS; w++) {
    if (weeks[w] && weeks[w].length > 0) {
      return true;
    }
  }

  return false;
}
  
  function isReadOnly(){
  return viewing !== "current";
}

function setGraphMode(mode){
  graphMode = mode;
  render();
}

  function switchCycle(val){
  viewing = val === "current" ? "current" : Number(val);
  render();
}

  function getActiveWeeks(){
  if (viewing === "current") {
    return db.weeks;
  }

  const cycle = db.history[viewing];
  return cycle ? cycle.weeks : {};
}

function getWeeksForLookup(){
  return getActiveWeeks();
}

function updateCycleDropdown(){
  const sel = document.getElementById('cycleSelect');
  sel.innerHTML = '<option value="current">Current Cycle</option>';

  db.history.forEach((_, i) => {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = `Cycle ${i+1}`;
    sel.appendChild(opt);
  });
}
  
  function getPreviousSession(currentSession) {
  const currentType = currentSession.type;
  const weeks = getWeeksForLookup();

  // 1️⃣ Same week, earlier sessions
  const weekSessions = weeks[currentWeek] || [];
  const index = weekSessions.findIndex(s => s.id === currentSession.id);

  for (let i = index - 1; i >= 0; i--) {
    const s = weekSessions[i];
    if (
      s.completed &&
      s.lift === currentSession.lift &&
      s.type === currentType
    ) {
      return s;
    }
  }

  // 2️⃣ Previous weeks within the ACTIVE cycle being viewed
  for (let w = currentWeek - 1; w >= 1; w--) {
    const sessions = weeks[w];
    if (!sessions) continue;

    for (let i = sessions.length - 1; i >= 0; i--) {
      const s = sessions[i];
      if (
        s.completed &&
        s.lift === currentSession.lift &&
        s.type === currentType
      ) {
        return s;
      }
    }
  }

  return null;
}

function getPB(lift){
  let max = 0;

  // Current cycle
  Object.values(db.weeks).forEach(week => {
    week.forEach(session => {
      if (session.lift === lift && session.completed) {
        session.sets.forEach(set => {
          const w = Number(set.w);
          if (w > max) max = w;
        });
      }
    });
  });

  // ✅ SAFE history check
  if (db.history && Array.isArray(db.history)) {
    db.history.forEach(cycle => {
      Object.values(cycle.weeks).forEach(week => {
        week.forEach(session => {
          if (session.lift === lift && session.completed) {
            session.sets.forEach(set => {
              const w = Number(set.w);
              if (w > max) max = w;
            });
          }
        });
      });
    });
  }

  return max;
}
  function isPB(session){
  if (!session.completed) return false;

  const pb = getPB(session.lift);

  return session.sets.some(set => {
    const w = Number(set.w);
    return w > 0 && w === pb;
  });
}

  function getPBDates(lift){
  let pbs = [];
  let max = 0;

  Object.values(db.weeks).forEach((week, wi) => {
    week.forEach(session => {
      if (session.lift !== lift || !session.completed) return;

      session.sets.forEach(set => {
        const w = Number(set.w);
        if (w > max){
          max = w;
          pbs.push({week: wi+1, weight: w});
        }
      });
    });
  });

  return pbs;
}

  function calculateSessionVolume(session){
  let total = 0;

  session.sets.forEach(set => {
    const w = Number(set.w);
    const r = Number(set.r);

    if (w && r) {
      total += w * r;
    }
  });

  return total;
}
 
  function getTargetSetCount(session){
  return session.type === "GVT" ? 10 : 5;
}

function ensureMainSetCount(session){
  const target = getTargetSetCount(session);
  const current = Array.isArray(session.sets) ? session.sets : [];

  session.sets = Array.from({ length: target }, (_, i) => ({
    w: current[i]?.w || "",
    r: current[i]?.r || ""
  }));
}
  
function hydrateSessionFromHistory(session) {
  const prevMain = getPreviousSession(session);
  const prevIso = getPreviousIsolationSession(session);

  session._prevMain = prevMain || null;
  session._prevIso = prevIso || null;

  // In history view, never auto-fill or mutate session content
  if (isReadOnly()) return;

  // Only stop auto-populating inputs if completed
  if (session.completed) return;

  // If lift changed, isolation data is invalid
  if (session.isolationLift && session.isolationLift !== session.lift) {
    session.isolations = [{}, {}, {}];
    delete session.isolationLift;
  }

  const hasIsolationData = session.isolations && session.isolations.length > 0;

  if (!hasIsolationData) {
    if (
      prevIso &&
      prevIso.lift === session.lift &&
      prevIso.isolations?.some(i => i.name)
    ) {
      session.isolations = prevIso.isolations.map(i => ({ ...i }));
      session.isolationLift = session.lift;
    }
  }
}
  
  function getPreviousIsolationSession(currentSession) {
  const weeks = getWeeksForLookup();

  // 1️⃣ Same week, earlier sessions
  const weekSessions = weeks[currentWeek] || [];
  const index = weekSessions.findIndex(s => s.id === currentSession.id);

  for (let i = index - 1; i >= 0; i--) {
    const s = weekSessions[i];
    if (
      s.completed &&
      s.lift === currentSession.lift &&
      s.isolations?.some(i => i.name)
    ) {
      return s;
    }
  }

  // 2️⃣ Previous weeks within the ACTIVE cycle being viewed
  for (let w = currentWeek - 1; w >= 1; w--) {
    const sessions = weeks[w];
    if (!sessions) continue;

    for (let i = sessions.length - 1; i >= 0; i--) {
      const s = sessions[i];
      if (
        s.completed &&
        s.lift === currentSession.lift &&
        s.isolations?.some(i => i.name)
      ) {
        return s;
      }
    }
  }

  return null;
}

/* ================= SESSION OPS ================= */

function addSession(){
  if (viewing !== "current") return;

  const newSession = {
    id: crypto.randomUUID(),
    lift: "Squat",
    type: "Core",
    mainSets: "",
    sets: [],
    isolations: [],
    isolationLift: null,
    notes: "",
    completed: false,
    timer: 0,
    timerRunning: false,
    gvtCount: 0,
    date: new Date().toISOString().split("T")[0]
  };

  ensureMainSetCount(newSession);

  getWeek().unshift(newSession);
  saveDB();
  render();
}

  function normaliseSession(s){
  s.sets = Array.isArray(s.sets) ? s.sets : [];
  s.isolations = Array.isArray(s.isolations) ? s.isolations : [];
  s.notes = s.notes || "";
  s.mainSets = s.mainSets || "";
  s.gvtCount = Number(s.gvtCount) || 0;
  s.timer = Number(s.timer) || 0;
  s.timerRunning = !!s.timerRunning;

  if (!s.date) {
    s.date = new Date().toISOString().split("T")[0];
  }

  if (!s.type) {
    s.type = "Core";
  }

  ensureMainSetCount(s);

  return s;
}

  function updateType(id, value){
  const s = getWeek().find(x => x.id === id);
  if (!s) return;
  if (s.completed) return;

  s.type = value;
  ensureMainSetCount(s);

  if (value !== "GVT") {
    s.timerRunning = false;
    s.timer = 0;
    s.gvtCount = 0;
    clearInterval(interval);
  }

  saveDB();
  render();
}
  
function deleteSession(id){
  const weeks = getActiveWeeks();
  weeks[currentWeek] = getWeek().filter(s => s.id !== id);
  saveDB();
  render();
}

function completeSession(id){
  const s = getWeek().find(x=>x.id===id);
  s.completed = true;

  if (!s.date) {
    s.date = new Date().toISOString();
  }

  // 🎉 mark for one-time animation
  if (isPB(s)) {
    s.pbHit = true;
  }

  saveDB();
  render();
}

function editSession(id){
  const s = getWeek().find(x=>x.id===id);
  s.completed = false;
  saveDB();
  render();
}

   // ---- RENDER ----

let graphMode = "weight"; // or "volume"
  
function buildSessionCard(session, container) {
  hydrateSessionFromHistory(session);

  const liftColors = {
    Squat: 'var(--primary)',
    Bench: 'var(--secondary)',
    Deadlift: 'var(--accent)',
    Row: '#06b6d4',
    "Overhead Press": '#8b5cf6',
    Open: '#9ca3af'
  };

  const card = document.createElement("div");
  card.className = "card";
  card.style.setProperty('--card-accent', liftColors[session.lift] || '#6366f1');

  const wrapper = document.createElement("div");
wrapper.className = "session-grid";

/* ================= LEFT COLUMN ================= */
const leftColumn = document.createElement("div");

const top = document.createElement("div");
top.className = "top-row";

top.innerHTML = `
  <input type="date"
    value="${session.date || ""}"

  function getLiftHistory(lift) {
  let entries = [];

// Helper to extract max + date from a week
function processWeek(week) {
  let max = 0;
  let bestSession = null;

  week.forEach(session => {
    if (session.lift !== lift || !session.completed) return;

    session.sets.forEach(set => {
      const w = Number(set.w);
      if (w > max) {
        max = w;
        bestSession = session;
      }
    });
  });

  if (max > 0 && bestSession) {
    entries.push({
      weight: max,
      volume: calculateSessionVolume(bestSession),
      date: bestSession.date || new Date().toISOString()
    });
  }
}

  // 1️⃣ Past cycles
  if (db.history && Array.isArray(db.history)) {
    db.history.forEach(cycle => {
      Object.values(cycle.weeks || {}).forEach(week => {
        processWeek(week);
      });
    });
  }

  // 2️⃣ Current cycle
  Object.values(db.weeks || {}).forEach(week => {
    processWeek(week);
  });

  // 3️⃣ Sort by date (important for graph order)
  entries.sort((a, b) => {
    if (!a.date && !b.date) return 0;
    if (!a.date) return -1;
    if (!b.date) return 1;
    return new Date(a.date) - new Date(b.date);
  });

  // 4️⃣ Keep last ~24 entries (~6 months)
  return entries.slice(-24);
}

  
function renderHistory(container){
  const lifts = ["Squat","Bench","Deadlift","Row","Overhead Press"];
  
  lifts.forEach(lift => {

    const data = getLiftHistory(lift);
    if (data.length === 0) return;

    const canvas = document.createElement("canvas");
    canvas.width = 320;
    canvas.height = 200;

    const ctx = canvas.getContext("2d");

    const padding = 30;
    const graphHeight = canvas.height - padding * 2;
    const graphWidth = canvas.width - padding * 2;

    const values = data.map(d => graphMode === "volume" ? d.volume : d.weight);
const maxW = Math.max(...values);
const minW = Math.min(...values);
    const range = maxW - minW || 1;

    let progress = 0;

    function draw(){
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      // ---- Axes ----
      ctx.strokeStyle = "#ddd";
      ctx.beginPath();
      ctx.moveTo(padding, padding);
      ctx.lineTo(padding, canvas.height - padding);
      ctx.lineTo(canvas.width - padding, canvas.height - padding);
      ctx.stroke();

      // ---- Y Axis Labels ----
ctx.fillStyle = "#666";
ctx.font = "10px Arial";
ctx.textAlign = "right";

const steps = 4; // number of horizontal lines

for (let i = 0; i <= steps; i++) {
  const value = minW + (range * i / steps);
  const y = canvas.height - padding - (i / steps) * graphHeight;

  // Label
  ctx.fillText(Math.round(value), padding - 5, y + 3);

  // Grid line
  ctx.strokeStyle = "#eee";
  ctx.beginPath();
  ctx.moveTo(padding, y);
  ctx.lineTo(canvas.width - padding, y);
  ctx.stroke();
}

      // ---- Smooth Main Line ----
      const liftColors = {
  Squat: '#6366f1',
  Bench: '#10b981',
  Deadlift: '#f59e0b',
  Row: '#06b6d4',
  "Overhead Press": '#8b5cf6',
  Open: '#9ca3af'
};

ctx.strokeStyle = liftColors[lift] || '#6366f1';
      ctx.lineWidth = 2;
      ctx.beginPath();

      const visiblePoints = Math.floor(data.length * progress);

      for (let i = 0; i < visiblePoints; i++) {
        const x = padding + (data.length === 1 ? 0.5 : i / (data.length - 1)) * graphWidth;
        const y = canvas.height - padding - ((data[i][graphMode] - minW) / range) * graphHeight;

        if (i === 0) {
          ctx.moveTo(x, y);
        } else {
          const prevX = padding + ((i - 1) / (data.length - 1)) * graphWidth;
          const prevY = canvas.height - padding - ((data[i - 1][graphMode] - minW) / range) * graphHeight;

          const midX = (prevX + x) / 2;
          const midY = (prevY + y) / 2;

          ctx.quadraticCurveTo(prevX, prevY, midX, midY);
        }
      }

      ctx.stroke();

      // ---- Points ----
      const overallMax = Math.max(...values);
      const lastIndex = data.length - 1;

      for (let i = 0; i < visiblePoints; i++) {
        const point = data[i];

        const x = padding + (data.length === 1 ? 0.5 : i / (data.length - 1)) * graphWidth;
        const y = canvas.height - padding - ((point[graphMode] - minW) / range) * graphHeight;

        const isPB = point[graphMode] === overallMax;
        const isLatest = i === lastIndex;

        if (isPB) ctx.fillStyle = "gold";
        else if (isLatest) ctx.fillStyle = "#1e40af";
        else ctx.fillStyle = "#3b82f6";

        ctx.beginPath();
        ctx.arc(x, y, isLatest ? 5 : 3, 0, Math.PI * 2);
        ctx.fill();
      }

      // ---- Dates (x-axis) ----
      ctx.fillStyle = "#666";
      ctx.font = "10px Arial";

      data.forEach((point, i) => {
        if (i % 2 !== 0) return;

        const x = padding + (data.length === 1 ? 0.5 : i / (data.length - 1)) * graphWidth;
        const d = new Date(point.date);
        const label = `${d.getDate()}/${d.getMonth()+1}`;

        ctx.fillText(label, x - 12, canvas.height - 5);
      });
    }

    // ---- Animate ----
    function animate(){
      progress += 0.05;
      if (progress > 1) progress = 1;

      draw();

      if (progress < 1) {
        requestAnimationFrame(animate);
      }
    }

    animate();

    // ---- Tap interaction ----
    canvas.addEventListener("click", (e) => {
      const rect = canvas.getBoundingClientRect();
      const clickX = e.clientX - rect.left;

      let closestIndex = 0;
      let closestDist = Infinity;

      data.forEach((_, i) => {
        const x = padding + (data.length === 1 ? 0.5 : i / (data.length - 1)) * graphWidth;
        const dist = Math.abs(clickX - x);

        if (dist < closestDist) {
          closestDist = dist;
          closestIndex = i;
        }
      });

      const point = data[closestIndex];
      const d = new Date(point.date);

      alert(`${lift}\n${point[graphMode]} kg\n${d.toDateString()}`);
    });

    // ---- Card ----
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `<strong>${lift} Progress (6 months)</strong>`;
    card.append(canvas);

    container.append(card);
  });
}

function focusNextField(currentEl) {
  if (!currentEl || isReadOnly()) return;

  const card = currentEl.closest(".card");
  if (!card) return;

  const fields = Array.from(
    card.querySelectorAll("input, select, textarea")
  ).filter(el =>
    !el.disabled &&
    el.type !== "hidden" &&
    el.offsetParent !== null
  );

  const index = fields.indexOf(currentEl);
  if (index === -1) return;

  const next = fields[index + 1];
  if (next) {
    next.focus();
    if (next.select && next.tagName === "INPUT") {
      next.select();
    }
  }
}

  document.addEventListener("keydown", e => {
  if (e.key !== "Enter") return;

  const target = e.target;
  if (!(target instanceof HTMLElement)) return;

  const isField =
    target.matches("input, select") ||
    (target.matches("textarea") && !target.disabled);

  if (!isField) return;
  if (target.disabled) return;
  if (isReadOnly()) return;

  // Let textarea Enter behave normally unless user wants quick move
  if (target.tagName === "TEXTAREA") return;

  e.preventDefault();
  target.blur();
  focusNextField(target);
});

  let audioCtx = null;

function initAudio(){
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }

  if (audioCtx.state === "suspended") {
    audioCtx.resume();
  }
}
  function beep(freq = 800, duration = 150){
  if (!audioCtx) return;

  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.type = "sine";
  osc.frequency.value = freq;

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.start();

  gain.gain.setValueAtTime(1, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration/1000);

  osc.stop(audioCtx.currentTime + duration/1000);
}
  let interval = null;

function updateDate(id, value){
  const s = getWeek().find(x => x.id === id);
  if (!s) return;

  s.date = value;
  saveDB();
}
  
function startTimer(id){
  initAudio();

  const s = getWeek().find(x => x.id === id);
  if (!s || s.timerRunning) return;

  clearInterval(interval);

  s.timerRunning = true;
  s.timer = s.timer > 0 ? s.timer : 90;

  interval = setInterval(() => {
    s.timer--;

    if (s.timer === 10) {
      beep(600, 100);
      setTimeout(() => beep(600, 100), 150);
    }

    if (s.timer === 3) beep(900, 120);
    if (s.timer === 2) beep(900, 120);
    if (s.timer === 1) beep(1400, 250);

    if (s.timer <= 0) {
      s.gvtCount = (s.gvtCount || 0) + 1;

      if (s.gvtCount >= 10) {
        clearInterval(interval);
        s.timerRunning = false;
        s.timer = 0;
        saveDB();
        render();
        return;
      }

      s.timer = 90;
    }

    saveDB();

    if (s.timer % 2 === 0) {
      render();
    }
  }, 1000);
}

function resetTimer(id){
  const s = getWeek().find(x => x.id === id);
  if (!s) return;

  clearInterval(interval);
  s.timerRunning = false;
  s.timer = 0;
  s.gvtCount = 0;

  saveDB();
  render();
}

};
  db.weeks = {};        // ✅ reset sessions
db.cycle = (db.cycle || 1) + 1;  // ✅ increment cycle

  // Save to history
  db.history.push(cycleCopy);

  // 🔥 AUTO DOWNLOAD BACKUP
  downloadBackup(cycleCopy);

  // Reset current
  db.current = {
    lifts:{Squat:[],Bench:[],Deadlift:[]},
    isolations:{Squat:[],Bench:[],Deadlift:[]},
    pbs:{Squat:0,Bench:0,Deadlift:0}
  };

  viewing = "current";
  currentWeek = 1;

  saveDB();
  render();
}

  function downloadBackup(data){
  const blob = new Blob([JSON.stringify(data, null, 2)], {
    type: 'application/json'
  });

  const date = new Date().toISOString().split('T')[0];
  const filename = `gymtrack_cycle_${date}.json`;

  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();

  URL.revokeObjectURL(a.href);
}

function resetAll(){
  if (!confirm("Are you sure you want to delete ALL data?")) return;
  if (!confirm("This cannot be undone. Really reset everything?")) return;

  localStorage.clear();
  location.reload();
}


/* ================= IMPORT / EXPORT ================= */

function exportData(){
  const blob=new Blob([JSON.stringify(db,null,2)],{type:"application/json"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="gymtrack-backup.json";
  a.click();
}

document.getElementById("importFile").addEventListener("change",e=>{
  const r=new FileReader();
  r.onload=ev=>{
    if (confirm("Replace all data?")) {
  try {
    const data = JSON.parse(ev.target.result);

    if (!data || typeof data !== "object") {
  alert("Invalid backup file");
  return;
}

    db = data;
    saveDB();
    render();

  } catch {
    alert("Import failed – invalid file");
  }
}
  };
  r.readAsText(e.target.files[0]);
});

/* ================= INIT ================= */

render();
</script>
