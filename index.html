}

  background:#3b82f6;

  border:none;
}

  opacity:0.9;
}

button[style*="ef4444"]{
  background:#ef4444 !important;

  .card{
  border-left:4px solid #3b82f6;

</style>
</head>

<body>

<!-- HEADER -->
<div class="card">
  <h2>GymTrack</h2>
<div>
  <strong>Cycle:</strong> <span id="cycleNumber"></span>
</div>
  <div class="row">
    <button onclick="changeWeek(-1)">◀</button>
    <strong id="weekTitle">Week 1</strong>
    <button onclick="changeWeek(1)">▶</button>

    <select id="weekTypeSelect" onchange="setWeekType(this.value)">
  <option value="GVT">GVT</option>
  <option value="Core">Core</option>
  <option value="Pause">Pause</option>
  <option value="Tempo">Tempo</option>
  <option value="Other">Other</option>
</select>

    <button onclick="addSession()">Add Session</button>
    <button onclick="cycleComplete()">Cycle Complete</button>

    <button onclick="exportData()">Export</button>
    <button onclick="document.getElementById('importFile').click()">Import</button>
    <input id="importFile" type="file" accept=".json" hidden>

    <button onclick="resetAll()" style="background:#ef4444;color:#fff">Reset</button>
  </div>

  <div id="weekGrid" class="row" style="margin-top:8px"></div>
</div>

  <div class="row" style="margin-top:8px">
  <button onclick="setView('main')">Main</button>
  <button onclick="setView('progress')">Progress</button>
  <button onclick="setView('history')">History</button>
</div>

<!-- MAIN -->
<div id="sessions"></div>

<script>
  const APP_VERSION = "3.0.0";
/* ================= DATA ================= */

const MAX_WEEKS = 12;
let currentWeek = 1;

let currentView = "main";

function setView(view){
  currentView = view;
  render();
}
  
const LIFTS = ["Squat","Bench","Deadlift","Row","Overhead Press","Open"];

let db = JSON.parse(localStorage.getItem("db")) || {};

db.cycle = db.cycle || 1;
db.weeks = db.weeks || {};
db.history = db.history || [];
db.weekTypes = db.weekTypes || {};

function saveDB(){
  localStorage.setItem("db", JSON.stringify(db));
}
const WEEK_TYPES = ["GVT","Core","Pause","Tempo","Other"];

function getWeekType(week = currentWeek) {
  if (!db.weekTypes) db.weekTypes = {};
  if (!db.weekTypes[week]) db.weekTypes[week] = "Core";
  return db.weekTypes[week];
}
/* ================= HELPERS ================= */

function getWeek(){
  if(!db.weeks[currentWeek]) db.weeks[currentWeek] = [];
  return db.weeks[currentWeek];
}

function isWeekLocked(week = currentWeek) {
  const sessions = db.weeks[week];
  if (!sessions) return false;
  return sessions.some(s => s.completed);
}

  function setWeekType(type, week = currentWeek) {
  if (!db.weekTypes) db.weekTypes = {};
  if (isWeekLocked(week)) return; // hard lock
  db.weekTypes[week] = type;
  saveDB();
  render();
}

  function getPreviousSession(currentSession) {
  const currentWeekType = getWeekType();

  // 1️⃣ Same week, earlier sessions
  const weekSessions = getWeek();
  const index = weekSessions.findIndex(s => s.id === currentSession.id);

  for (let i = index - 1; i >= 0; i--) {
    const s = weekSessions[i];
    if (
      s.completed &&
      s.lift === currentSession.lift
    ) {
      return s;
    }
  }

  // 2️⃣ Previous weeks (same week type only)
  for (let w = currentWeek - 1; w >= 1; w--) {
    if (getWeekType(w) !== currentWeekType) continue;

    const sessions = db.weeks[w];
    if (!sessions) continue;

    for (let i = sessions.length - 1; i >= 0; i--) {
      const s = sessions[i];
      if (
        s.completed &&
        s.lift === currentSession.lift
      ) {
        return s;
      }
    }
  }

  return null;
}

function getPB(lift){
  let max = 0;

  // Current cycle
  Object.values(db.weeks).forEach(week => {
    week.forEach(session => {
      if (session.lift === lift && session.completed) {
        session.sets.forEach(set => {
          const w = Number(set.w);
          if (w > max) max = w;
        });
      }
    });
  });

  // ✅ SAFE history check
  if (db.history && Array.isArray(db.history)) {
    db.history.forEach(cycle => {
      Object.values(cycle.weeks).forEach(week => {
        week.forEach(session => {
          if (session.lift === lift && session.completed) {
            session.sets.forEach(set => {
              const w = Number(set.w);
              if (w > max) max = w;
            });
          }
        });
      });
    });
  }

  return max;
}
  function isPB(session){
  if (!session.completed) return false;

  const pb = getPB(session.lift);

  return session.sets.some(set => {
    const w = Number(set.w);
    return w > 0 && w === pb;
  });
}

  function getPBDates(lift){
  let pbs = [];
  let max = 0;

  Object.values(db.weeks).forEach((week, wi) => {
    week.forEach(session => {
      if (session.lift !== lift || !session.completed) return;

      session.sets.forEach(set => {
        const w = Number(set.w);
        if (w > max){
          max = w;
          pbs.push({week: wi+1, weight: w});
        }
      });
    });
  });

  return pbs;
}
  
function hydrateSessionFromHistory(session) {

  delete session._prevMain;
  delete session._prevIso;

  // ✅ ALWAYS calculate previous data (even if completed)
  const prevMain = getPreviousSession(session);
  const prevIso = getPreviousIsolationSession(session);

  session._prevMain = prevMain || null;
  session._prevIso = prevIso || null;

  // ❌ Only stop auto-populating inputs if completed
  if (session.completed) return;

  /* ================= ISOLATIONS ================= */

  // If lift changed, isolation data is invalid
  if (session.isolationLift && session.isolationLift !== session.lift) {
    session.isolations = [{},{},{}];
    delete session.isolationLift;
  }

  const hasIsolationData = session.isolations && session.isolations.length > 0;

  if (!hasIsolationData) {
    const prevIso = getPreviousIsolationSession(session);

    if (
      prevIso &&
      prevIso.lift === session.lift &&
      prevIso.isolations?.some(i => i.name)
    ) {
      session.isolations = prevIso.isolations.map(i => ({ ...i }));
      session.isolationLift = session.lift;
    }
  }
}
  
  function getPreviousIsolationSession(currentSession) {

  // 1️⃣ Same week, earlier sessions (ignore week type)
  const weekSessions = getWeek();
  const index = weekSessions.findIndex(s => s.id === currentSession.id);

  for (let i = index - 1; i >= 0; i--) {
    const s = weekSessions[i];
    if (
      s.completed &&
      s.lift === currentSession.lift &&
      s.isolations?.some(i => i.name)
    ) {
      return s;
    }
  }

  // 2️⃣ Previous weeks (IGNORE week type)
  for (let w = currentWeek - 1; w >= 1; w--) {
    const sessions = db.weeks[w];
    if (!sessions) continue;

    for (let i = sessions.length - 1; i >= 0; i--) {
      const s = sessions[i];
      if (
        s.completed &&
        s.lift === currentSession.lift &&
        s.isolations?.some(i => i.name)
      ) {
        return s;
      }
    }
  }

  return null;
}

/* ================= SESSION OPS ================= */

function addSession(){
  getWeek().unshift({
    id: crypto.randomUUID(),
    lift: "Squat",
    mainSets: "",
    sets: Array.from({length:5},()=>({w:"",r:""})),
    isolations: [],
    isolationLift: null,
    notes: "",
    completed: false,
    timer: 0,
    timerRunning: false,
    gvtCount: 0
    date: Date.now()
  });
  saveDB();
  render();
}

  function normaliseSession(s){
  s.sets = s.sets || [];
  s.isolations = s.isolations || [];
  s.notes = s.notes || "";
  return s;
}

function deleteSession(id){
  db.weeks[currentWeek] = getWeek().filter(s=>s.id!==id);
  saveDB();
  render();
}

function completeSession(id){
  const s = getWeek().find(x=>x.id===id);
  s.completed = true;

  if (!s.date) {
    s.date = new Date().toISOString();
  }

  saveDB();
  render();
}

function editSession(id){
  const s = getWeek().find(x=>x.id===id);
  s.completed = false;
  saveDB();
  render();
}

   // ---- RENDER ----

function renderMain(c){
  getWeek().forEach(session => {
    hydrateSessionFromHistory(session);

    const card = document.createElement("div");

    if (isPB(session)) {
      card.style.border = "2px solid gold";
    }

    card.className = "card" + (session.completed ? " locked" : "");

    const prev = document.createElement("div");
    prev.className = "prev";
    prev.innerHTML = "<strong>Previous</strong><br>";

if (isPB(session)) {
  prev.innerHTML += "🏆 <strong>PB!</strong><br>";
}
  if (session._prevMain) {
  prev.innerHTML += "<em>Main:</em><br>";

  const isGVT = getWeekType() === "GVT";

  if (isGVT && session._prevMain.mainSets) {
    const firstSet = session._prevMain.sets.find(s => s.w || s.r);

    if (firstSet) {
      prev.innerHTML += `${session._prevMain.mainSets} @ ${firstSet.w || ""} × ${firstSet.r || ""}<br>`;
    }
  } else {
    session._prevMain.sets.forEach(set => {
      if (set.w || set.r) {
        prev.innerHTML += `${set.w || ""} × ${set.r || ""}<br>`;
      }
    });
  }

  if (session._prevMain.notes) {
    prev.innerHTML += "<em>Notes:</em><br>";
    prev.innerHTML += `${session._prevMain.notes}<br>`;
  }
}

  if (session._prevIso) {
  prev.innerHTML += "<em>Isolation:</em><br>";
  session._prevIso.isolations.forEach(i => {
    if (i.name) {
      prev.innerHTML += `${i.name} ${i.sets || ""}×${i.reps || ""}@${i.weight || ""}<br>`;
    }
  });
}
    
    const curr = document.createElement("div");
    curr.className = "curr";

    curr.innerHTML += `
      <select ${session.completed ? "disabled" : ""}
        onchange="updateLift('${session.id}',this.value)">
        ${LIFTS.map(l => `<option ${l===session.lift?"selected":""}>${l}</option>`).join("")}
      </select>
    `;
const isGVT = getWeekType() === "GVT";

if (isGVT) {
  curr.innerHTML += `
    <div class="set">
      Sets
      <input type="number" placeholder="e.g. 10"
        value="${session.mainSets || ""}"
        ${session.completed ? "disabled" : ""}
        onblur="updateMainSets('${session.id}', this.value)">
    </div>
  `;
}
  if (isGVT) {
  curr.innerHTML += `
    <div style="margin-top:8px;padding:6px;background:#fff3cd;border-radius:6px">
      <strong>GVT Timer</strong><br>
      Time: ${session.timer || 0}s<br>
      Sets: ${session.gvtCount || 0} / 10<br>
      <button onclick="initAudio(); startTimer('${session.id}')">Start</button>
      <button onclick="resetTimer('${session.id}')">Reset</button>
    </div>
  `;
}
    session.sets.forEach((set,i) => {
      curr.innerHTML += `
        <div class="set">
          ${i+1}
          <input type="number" placeholder="kg" value="${set.w}" ${session.completed?"disabled":""}
  onblur="updateSet('${session.id}',${i},'w',this.value)">
<input type="number" placeholder="reps" value="${set.r}" ${session.completed?"disabled":""}
  onblur="updateSet('${session.id}',${i},'r',this.value)">
        </div>
      `;
    });

    session.isolations.forEach((iso,i) => {
      curr.innerHTML += `
        <div class="iso">
          <input placeholder="Exercise" value="${iso.name||""}" ${session.completed?"disabled":""}
            onblur="updateIso('${session.id}',${i},'name',this.value)">
          <input placeholder="Sets" value="${iso.sets||""}" ${session.completed?"disabled":""}
            onblur="updateIso('${session.id}',${i},'sets',this.value)">
          <input placeholder="Reps" value="${iso.reps||""}" ${session.completed?"disabled":""}
            onblur="updateIso('${session.id}',${i},'reps',this.value)">
          <input placeholder="Weight" value="${iso.weight||""}" ${session.completed?"disabled":""}
            onblur="updateIso('${session.id}',${i},'weight',this.value)">
        </div>
      `;
    });

  curr.innerHTML += `
  <button onclick="addIsolation('${session.id}')">+ Add Exercise</button>
`;

    curr.innerHTML += `
      <textarea ${session.completed?"disabled":""}
        onblur="updateNotes('${session.id}',this.value)">${session.notes}</textarea>
    `;

    curr.innerHTML += session.completed
      ? `<button onclick="editSession('${session.id}')">Edit</button>`
      : `<button onclick="completeSession('${session.id}')">Complete</button>
         <button onclick="deleteSession('${session.id}')">Delete</button>`;

    const row = document.createElement("div");
    row.className = "row";
    row.append(prev, curr);
    card.append(row);
    c.append(card);
  });
}
  
    function estimate1RM(weight, reps){
    weight = Number(weight);
    reps = Number(reps);
    if (!weight || !reps) return 0;
    return Math.round(weight * (1 + reps / 30));
  }

function formatDate(d){
  if (!d) return "";
  const date = new Date(d);
  return `${date.getDate()}/${date.getMonth()+1}/${date.getFullYear().toString().slice(-2)}`;
}
  
  function renderProgress(container){
  const lifts = ["Squat","Bench","Deadlift","Row","Overhead Press"];

  lifts.forEach(lift => {

    let bestWeight = 0;
let bestWeightWeek = null;
let bestWeightDate = null;

let best5RM = 0;
let best5RMWeek = null;
let best5RMDate = null;

let bestEst1RM = 0;
let bestEst1RMWeek = null;
let bestEst1RMDate = null;

    let hasData = false;

    // Loop through weeks
    Object.entries(db.weeks).forEach(([weekNum, week]) => {
      week.forEach(session => {
        if (session.lift !== lift || !session.completed) return;

        hasData = true;

        session.sets.forEach(set => {
          const w = Number(set.w);
          const r = Number(set.r);

          if (!w || !r) return;

          if (w > bestWeight) {
  bestWeight = w;
  bestWeightWeek = weekNum;
  bestWeightDate = session.date;
}

if (r === 5 && w > best5RM) {
  best5RM = w;
  best5RMWeek = weekNum;
  best5RMDate = session.date;
}

const est = estimate1RM(w, r);
if (est > bestEst1RM) {
  bestEst1RM = est;
  bestEst1RMWeek = weekNum;
  bestEst1RMDate = session.date;
}  
        });
      });
    });

    // 🚫 Skip lifts never trained
    if (!hasData) return;

    const card = document.createElement("div");
    card.className = "card";

    const has5RM = best5RM > 0;

card.innerHTML = `
  <strong>${lift}</strong><br><br>

  🟢 <strong>Actual</strong><br>
  ${bestWeight ? `🏆 <strong>Max Weight:</strong> ${bestWeight} kg (W${bestWeightWeek})<br><small>${formatDate(bestWeightDate)}</small><br>` : ""}
  ${best5RM ? `🏆 <strong>5RM:</strong> ${best5RM} kg (W${best5RMWeek})<br><small>${formatDate(best5RMDate)}</small><br>` : "<em>No 5RM yet</em><br>"}
  <br>

  🔵 <strong>Estimated</strong><br>
  ${bestEst1RM ? `<strong>1RM:</strong> ${bestEst1RM} kg (W${bestEst1RMWeek})<br><small>${formatDate(bestEst1RMDate)}</small>` : "<em>No data</em>"}
`;

    container.append(card);
  });
}

  function getLiftHistory(lift) {
  let entries = [];

  // Helper to extract max + date from a week
  function processWeek(week) {
    let max = 0;
    let sessionDate = null;

    week.forEach(session => {
      if (session.lift !== lift || !session.completed) return;

      session.sets.forEach(set => {
        const w = Number(set.w);
        if (w > max) {
          max = w;
          sessionDate = session.date || sessionDate;
        }
      });
    });

    if (max > 0) {
      entries.push({
        weight: max,
        date: sessionDate || new Date().toISOString()
      });
    }
  }

  // 1️⃣ Past cycles
  if (db.history && Array.isArray(db.history)) {
    db.history.forEach(cycle => {
      Object.values(cycle.weeks || {}).forEach(week => {
        processWeek(week);
      });
    });
  }

  // 2️⃣ Current cycle
  Object.values(db.weeks || {}).forEach(week => {
    processWeek(week);
  });

  // 3️⃣ Sort by date (important for graph order)
  entries.sort((a, b) => {
    if (!a.date && !b.date) return 0;
    if (!a.date) return -1;
    if (!b.date) return 1;
    return new Date(a.date) - new Date(b.date);
  });

  // 4️⃣ Keep last ~24 entries (~6 months)
  return entries.slice(-24);
}

  
function renderHistory(container){
  const lifts = ["Squat","Bench","Deadlift"];

  lifts.forEach(lift => {

    const data = getLiftHistory(lift);
    if (data.length === 0) return;

    const canvas = document.createElement("canvas");
    canvas.width = 320;
    canvas.height = 180;

    const ctx = canvas.getContext("2d");

    const padding = 25;
    const graphHeight = canvas.height - padding * 2;
    const graphWidth = canvas.width - padding * 2;

    const weights = data.map(d => d.weight);
    const maxW = Math.max(...weights);
    const minW = Math.min(...weights);
    const range = maxW - minW || 1;

    // ---- Clear ----
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // ---- Axes ----
    ctx.strokeStyle = "#ddd";
    ctx.beginPath();
    ctx.moveTo(padding, padding);
    ctx.lineTo(padding, canvas.height - padding);
    ctx.lineTo(canvas.width - padding, canvas.height - padding);
    ctx.stroke();

    // ---- Main line ----
    ctx.strokeStyle = "#3b82f6";
    ctx.lineWidth = 2;
    ctx.beginPath();

    data.forEach((point, i) => {
      const x = padding + (i / (data.length - 1)) * graphWidth;
      const y = canvas.height - padding - ((point.weight - minW) / range) * graphHeight;

      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    });

    ctx.stroke();

    // ---- Trend line (moving average) ----
    ctx.strokeStyle = "#999";
    ctx.lineWidth = 1;
    ctx.beginPath();

    const windowSize = 3;

    data.forEach((_, i) => {
      let sum = 0;
      let count = 0;

      for (let j = i - 1; j <= i + 1; j++) {
        if (data[j]) {
          sum += data[j].weight;
          count++;
        }
      }

      const avg = sum / count;

      const x = padding + (i / (data.length - 1)) * graphWidth;
      const y = canvas.height - padding - ((avg - minW) / range) * graphHeight;

      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    });

    ctx.stroke();

    // ---- Points + PBs ----
    const overallMax = Math.max(...data.map(d => d.weight));

data.forEach((point, i) => {
  const x = padding + (i / (data.length - 1)) * graphWidth;
  const y = canvas.height - padding - ((point.weight - minW) / range) * graphHeight;

  const isCurrentPB = point.weight === overallMax;

  ctx.fillStyle = isCurrentPB ? "gold" : "#3b82f6";

  ctx.beginPath();
  ctx.arc(x, y, isCurrentPB ? 5 : 3, 0, Math.PI * 2);
  ctx.fill();
});

    // ---- Labels ----
    ctx.fillStyle = "#666";
ctx.font = "10px Arial";

data.forEach((point, i) => {
  // Show fewer labels (avoid clutter)
  if (i % 2 !== 0) return;

  const x = padding + (i / (data.length - 1)) * graphWidth;

  const d = new Date(point.date);
  const label = `${d.getDate()}/${d.getMonth()+1}`;

  ctx.fillText(label, x - 12, canvas.height - 5);
});

    // ---- Title ----
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `<strong>${lift} Progress (6 months)</strong>`;
    card.append(canvas);

    container.append(card);
  });
}
  
function render(){
  document.getElementById("weekTitle").textContent = `Week ${currentWeek}`;
  renderWeekButtons();

  // ✅ Normalise ALL sessions first
  getWeek().forEach(s => normaliseSession(s));

  const c = document.getElementById("sessions");
  c.innerHTML = "";

  if (currentView === "main") {
    renderMain(c);
  } else if (currentView === "progress") {
    renderProgress(c);
  } else if (currentView === "history") {
    renderHistory(c);
  }
}

  
  
/* ================= UPDATES ================= */

function updateLift(id, v){
  const s = getWeek().find(x => x.id === id);
  if (!s) return;

  if (s.lift !== v) {
    s.lift = v;
    s.isolations = [];
    delete s.isolationLift;
  }

  saveDB();
  render();
}
function updateSet(id,i,f,v){getWeek().find(s=>s.id===id).sets[i][f]=v;saveDB()}
function updateIso(id,i,f,v){getWeek().find(s=>s.id===id).isolations[i][f]=v;saveDB()}
function updateNotes(id,v){getWeek().find(s=>s.id===id).notes=v;saveDB()}
function updateMainSets(id, v){
  const s = getWeek().find(x => x.id === id);
  if (!s) return;
  s.mainSets = v;
  saveDB();
}
  function addIsolation(id){
  const s = getWeek().find(x => x.id === id);
  if (!s) return;

  s.isolations.push({name:"", sets:"", reps:"", weight:""});
  saveDB();
  render();
}
  let audioCtx = null;

function initAudio(){
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }

  if (audioCtx.state === "suspended") {
    audioCtx.resume();
  }
}
  function beep(freq = 800, duration = 150){
  if (!audioCtx) return;

  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.type = "sine";
  osc.frequency.value = freq;

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.start();

  gain.gain.setValueAtTime(1, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration/1000);

  osc.stop(audioCtx.currentTime + duration/1000);
}
  let interval = null;

function startTimer(id){
  initAudio();
  const s = getWeek().find(x => x.id === id);
  if (!s || s.timerRunning) return;

  s.timerRunning = true;
  s.timer = 90;

  interval = setInterval(() => {
    s.timer--;

/* 🔔 10 second cue */
if (s.timer === 10) {
  beep(600, 100);
  setTimeout(() => beep(600, 100), 150);
}

/* 🔊 Countdown 3,2,1 */
if (s.timer === 3) beep(900, 120);
if (s.timer === 2) beep(900, 120);
if (s.timer === 1) beep(1400, 250);

    if (s.timer <= 0) {
      s.gvtCount = (s.gvtCount || 0) + 1;

      if (s.gvtCount >= 10) {
        clearInterval(interval);
        s.timerRunning = false;
        s.timer = 0;
        saveDB();
        render();
        return;
      }

      s.timer = 90; // reset for next round
    }

    saveDB();
    render();
  }, 1000);
}

function resetTimer(id){
  const s = getWeek().find(x => x.id === id);
  if (!s) return;

  clearInterval(interval);
  s.timerRunning = false;
  s.timer = 0;
  s.gvtCount = 0;

  saveDB();
  render();
}
/* ================= HEADER ================= */

function changeWeek(d){
  currentWeek=Math.max(1,Math.min(MAX_WEEKS,currentWeek+d));
  render();
}

function renderWeekButtons(){
  const g=document.getElementById("weekGrid");
  g.innerHTML="";
  for(let i=1;i<=MAX_WEEKS;i++){
    const b=document.createElement("button");
    b.textContent=`W${i}`;
    b.className="week-btn "+(i===currentWeek?"active":"inactive");
    b.onclick=()=>{currentWeek=i;render()};
    g.append(b);
  }
}

function cycleComplete() {
  if (!confirm(`Cycle ${db.cycle} complete. Backup now?`)) return;

  // 1️⃣ Export backup
  exportData();

  // 2️⃣ Store completed cycle number
  const completedCycle = db.cycle;

  // 3️⃣ Archive current cycle
  db.history.push({
    cycle: completedCycle,
    weeks: JSON.parse(JSON.stringify(db.weeks)),
    weekTypes: JSON.parse(JSON.stringify(db.weekTypes || {}))
  });

  // 4️⃣ Advance cycle
  db.cycle++;

  // 5️⃣ Reset current cycle data
  db.weeks = {};
  db.weekTypes = {};

  // 6️⃣ Reset UI
  currentWeek = 1;

  // 7️⃣ Save + render
  saveDB();
  render();

  alert(`Cycle ${completedCycle} archived. New cycle started.`);
}

function resetAll(){
  if (!confirm("Are you sure you want to delete ALL data?")) return;
  if (!confirm("This cannot be undone. Really reset everything?")) return;

  localStorage.clear();
  location.reload();
}


/* ================= IMPORT / EXPORT ================= */

function exportData(){
  const blob=new Blob([JSON.stringify(db,null,2)],{type:"application/json"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="gymtrack-backup.json";
  a.click();
}

document.getElementById("importFile").addEventListener("change",e=>{
  const r=new FileReader();
  r.onload=ev=>{
    if(confirm("Replace all data?")){
      db=JSON.parse(ev.target.result);
      saveDB();
      render();
    }
  };
  r.readAsText(e.target.files[0]);
});

/* ================= INIT ================= */

render();
</script>
